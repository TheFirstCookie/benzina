name: Pret Carburanti ANRE

on:
  schedule:
    - cron: '40 17 * * 1-5' # Luni-Vineri la 17:40 UTC (20:40 Moldova)
  workflow_dispatch:         # permite si rulare manuala din GitHub

jobs:
  send-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalare dependențe
        run: pip install -r requirements.txt

      - name: Rulare bot
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
